name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Django)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hearthline
          POSTGRES_USER: hearthline
          POSTGRES_PASSWORD: hearthline_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready --health-interval 5s
          --health-timeout 3s --health-retries 10
    env:
      POSTGRES_HOST: localhost
      POSTGRES_DB: hearthline
      POSTGRES_USER: hearthline
      POSTGRES_PASSWORD: hearthline_test
      DJANGO_SECRET_KEY: ci-secret
      DJANGO_DEBUG: '0'
      DJANGO_ALLOWED_HOSTS: '*'
      HEARTHLINE_ENCRYPTION_KEY: 8sJk6HGZ_mXqkJZ3p4Yp7Vw8oV1NfQkM7d2g3hT0a5Y=
      VAPI_WEBHOOK_SECRET: ci-vapi-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r backend/requirements.txt
      - run: |
          cd backend
          python manage.py makemigrations --check --dry-run
          python manage.py migrate --noinput
          python manage.py check

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api
